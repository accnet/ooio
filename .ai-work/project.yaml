# Project-specific AI-Kit configuration.
# Keep runtime, skills, and provider binaries in ~/ai-kit.
project:
  stack: []
  source_dirs: []

# Small fixes still use the control plane, but can skip planning and review.
# Enable per project when this shortened lifecycle is appropriate.
workflow:
  # Explicitly close normal tasks after QA when reviewer is off.
  close_after_qa: false
  micro_tasks:
    enabled: false
    max_files: 2
    require_qa: true
    require_review: false

# `cwd` is relative to the project root. Empty values mean that this project
# has not declared that check yet.
verification:
  # Repo đa ngôn ngữ (NestJS API + Go Agent + 3 Vite SPA) nhưng ở đây chỉ có MỘT
  # `cwd`, nên các lệnh đi qua scripts/verify.sh để phủ hết. Xem script để biết
  # cái gì được chạy và cái gì bị bỏ qua có chủ đích.
  cwd: .
  test_command: ./scripts/verify.sh test
  typecheck_command: ./scripts/verify.sh typecheck
  build_command: ./scripts/verify.sh build
  # lint_command để trống: repo chưa có cấu hình lint. Khai một lệnh không tồn
  # tại sẽ làm gate trượt MỌI task — tệ hơn là không khai.
  lint_command:
